<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VCET-IT | Leave &amp; OD Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream:      #fdf8f0;
  --cream-mid:  #f5eedf;
  --cream-dark: #e8ddc8;
  --forest:     #2c4a3e;
  --forest-mid: #3d6455;
  --forest-lt:  #4f7d6a;
  --gold:       #c9973a;
  --gold-lt:    #e0b05a;
  --gold-pale:  #f5e4c0;
  --ink:        #1e2d26;
  --ink-mid:    #4a5e55;
  --ink-faint:  #8a9e95;
  --white:      #ffffff;
  --danger:     #b85c38;
}

html, body {
  min-height: 100vh;
  font-family: 'Outfit', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow-x: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

#pCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

.orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.orb {
  position: absolute; border-radius: 50%; filter: blur(70px);
  animation: orbDrift 14s ease-in-out infinite;
}
.o1 { width: 500px; height: 500px; top: -180px; left: -120px; background: radial-gradient(circle, rgba(201,151,58,0.18), transparent 70%); animation-duration: 16s; }
.o2 { width: 380px; height: 380px; bottom: -120px; right: -100px; background: radial-gradient(circle, rgba(44,74,62,0.14), transparent 70%); animation-duration: 13s; animation-delay: -5s; }
.o3 { width: 260px; height: 260px; top: 40%; left: 55%; background: radial-gradient(circle, rgba(224,176,90,0.12), transparent 70%); animation-duration: 11s; animation-delay: -3s; }
@keyframes orbDrift {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(30px,-24px) scale(1.06); }
  66%      { transform: translate(-18px,20px) scale(0.95); }
}

.wrapper {
  position: relative; z-index: 1;
  width: 100%; min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 20px 40px;
}

/* ── COLLEGE HEADER ── */
.college-header {
  text-align: center; margin-bottom: 24px;
  animation: fadeDown 0.9s cubic-bezier(0.22,1,0.36,1) both;
}
.college-logo-row {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; margin-bottom: 12px;
}
.badge {
  width: 56px; height: 56px;
  background: linear-gradient(145deg, var(--forest) 0%, var(--forest-mid) 100%);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 28px rgba(44,74,62,0.28), inset 0 1px 0 rgba(255,255,255,0.12);
  flex-shrink: 0; position: relative; overflow: hidden;
}
.badge::before {
  content: ''; position: absolute;
  width: 200%; height: 200%; top: -50%; left: -50%;
  background: conic-gradient(from 0deg, transparent 60%, rgba(201,151,58,0.4) 100%);
  animation: badgeSpin 7s linear infinite;
}
@keyframes badgeSpin { to { transform: rotate(360deg); } }
.badge-v {
  position: relative; z-index: 1;
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; font-weight: 700; color: var(--gold-lt);
}
.college-name-col { text-align: left; }
.college-name {
  font-size: 15px; font-weight: 700; color: var(--ink);
  letter-spacing: 0.2px; line-height: 1.25;
}
.college-location {
  font-size: 11.5px; font-weight: 300; color: var(--ink-faint);
  margin-top: 3px; letter-spacing: 0.3px;
}
.dept-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--white); border: 1.5px solid var(--cream-dark);
  border-radius: 30px; padding: 7px 18px;
  font-size: 12px; font-weight: 500; color: var(--forest);
  box-shadow: 0 2px 10px rgba(44,74,62,0.09); letter-spacing: 0.4px;
}
.dept-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-lt));
  flex-shrink: 0; box-shadow: 0 0 0 3px rgba(201,151,58,0.2);
  animation: dotPulse 2.4s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(201,151,58,0.2); }
  50%      { box-shadow: 0 0 0 7px rgba(201,151,58,0.05); }
}

/* ── CARD ── */
.card {
  background: var(--white); border-radius: 28px;
  width: 100%; max-width: 420px;
  box-shadow: 0 24px 64px rgba(44,74,62,0.13), 0 4px 16px rgba(44,74,62,0.07),
              0 0 0 1.5px rgba(201,151,58,0.14);
  position: relative; overflow: hidden;
  animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s both;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; z-index: 2;
  background: linear-gradient(90deg, var(--gold), var(--gold-lt), var(--forest-lt), var(--gold));
  background-size: 250% 100%; animation: barShimmer 4s linear infinite;
}
@keyframes barShimmer { to { background-position: 250% center; } }
.card-body { padding: 36px 32px 32px; }

.form-greeting {
  font-size: 11px; font-weight: 600; letter-spacing: 2.8px;
  text-transform: uppercase; color: var(--gold);
  display: flex; align-items: center; gap: 9px; margin-bottom: 10px;
}
.form-greeting-line { width: 22px; height: 2px; background: var(--gold); border-radius: 2px; }
.form-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px; font-weight: 600;
  color: var(--ink); line-height: 1.12; margin-bottom: 9px;
}
.form-sub {
  font-size: 13.5px; color: var(--ink-mid); font-weight: 300;
  line-height: 1.65; margin-bottom: 26px;
}

.notice {
  display: flex; align-items: flex-start; gap: 11px;
  background: linear-gradient(135deg, #fdf4e4, #f9ecd4);
  border: 1.5px solid rgba(201,151,58,0.26); border-radius: 14px;
  padding: 13px 15px; margin-bottom: 24px;
  font-size: 12.5px; color: #7a5c20; line-height: 1.55; font-weight: 400;
}
.notice svg { width: 16px; height: 16px; stroke: var(--gold); fill: none; flex-shrink: 0; margin-top: 1px; stroke-width: 1.9; }

.err-box {
  display: none; align-items: flex-start; gap: 10px;
  background: linear-gradient(135deg, #fef2f2, #fdeaea);
  border: 1.5px solid rgba(184,92,56,0.28); border-radius: 12px;
  padding: 12px 14px; margin-bottom: 16px;
  font-size: 12.5px; color: #7a2e1a; line-height: 1.55;
}
.err-box.show { display: flex; animation: shake 0.38s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); } 20% { transform: translateX(-7px); }
  40% { transform: translateX(7px); }   60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.err-box svg { width: 16px; height: 16px; stroke: var(--danger); fill: none; flex-shrink: 0; margin-top: 1px; stroke-width: 1.9; }

.field { margin-bottom: 16px; }
.field-wrap {
  position: relative; background: var(--cream);
  border: 1.5px solid var(--cream-dark); border-radius: 14px;
  transition: border-color .25s, background .25s, box-shadow .25s; overflow: hidden;
}
.field-wrap:focus-within {
  border-color: rgba(201,151,58,0.55); background: var(--white);
  box-shadow: 0 0 0 4px rgba(201,151,58,0.1);
}
.field-bar {
  position: absolute; bottom: 0; left: 14px; right: 14px; height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--forest-lt));
  border-radius: 2px 2px 0 0;
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
}
.field-wrap:focus-within .field-bar { transform: scaleX(1); }
.field-input {
  width: 100%; padding: 20px 16px 8px; background: transparent; border: none;
  color: var(--ink); font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 400;
  outline: none; -webkit-appearance: none;
}
.field-input::placeholder { color: transparent; }
.field-input:-webkit-autofill { -webkit-box-shadow: 0 0 0 1000px var(--white) inset; -webkit-text-fill-color: var(--ink); }
.field-label {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  font-size: 14px; color: var(--ink-faint); pointer-events: none; font-weight: 300;
  transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
.field-input:focus + .field-label,
.field-input:not(:placeholder-shown) + .field-label {
  top: 10px; transform: translateY(0); font-size: 10px; letter-spacing: 1.3px;
  text-transform: uppercase; color: var(--gold); font-weight: 600;
}
.eye-btn {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--ink-faint); padding: 4px;
  transition: color .2s, transform .22s;
}
.eye-btn:hover { color: var(--forest); transform: translateY(-50%) scale(1.12); }
.eye-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.9; }

.btn {
  width: 100%; padding: 16px 24px;
  background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%);
  color: var(--white); border: none; border-radius: 14px;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-top: 8px; position: relative; overflow: hidden;
  box-shadow: 0 8px 24px rgba(44,74,62,0.32), 0 2px 6px rgba(44,74,62,0.2);
  transition: all 0.32s cubic-bezier(0.34,1.56,0.64,1);
}
.btn::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left .55s ease;
}
.btn:hover::before { left: 150%; }
.btn:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 16px 40px rgba(44,74,62,0.4); }
.btn:active { transform: translateY(0) scale(0.99); }
.btn:disabled { opacity: .65; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
.btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.2; flex-shrink: 0; }

.spinner {
  width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.25);
  border-top-color: var(--white); border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.card-footer {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-top: 22px; font-size: 11px; color: var(--ink-faint);
}
.fsep { width: 3px; height: 3px; border-radius: 50%; background: var(--cream-dark); }
.fitem { display: flex; align-items: center; gap: 5px; font-weight: 300; }
.fitem svg { width: 12px; height: 12px; fill: none; stroke: var(--ink-faint); opacity: .55; stroke-width: 1.8; }

/* ── PORTAL TAGS ── */
.portal-tags {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
  margin-top: 18px; max-width: 420px; width: 100%;
  animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.35s both;
}
.ptag {
  display: flex; align-items: center; gap: 7px;
  background: var(--white); border: 1.5px solid var(--cream-dark);
  border-radius: 30px; padding: 6px 14px;
  font-size: 12px; font-weight: 400; color: var(--ink-mid);
  box-shadow: 0 2px 8px rgba(44,74,62,0.07); cursor: default;
  transition: all .28s cubic-bezier(0.34,1.56,0.64,1);
}
.ptag svg { width: 13px; height: 13px; stroke: var(--forest-lt); fill: none; stroke-width: 1.9; }
.ptag:hover { border-color: var(--gold-lt); color: var(--forest); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(201,151,58,0.15); }
.ptag:hover svg { stroke: var(--gold); }

@keyframes fadeUp   { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
@keyframes fadeDown { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: translateY(0); } }

@media (max-width: 480px) {
  .college-name { font-size: 13.5px; }
  .card-body { padding: 30px 22px 26px; }
  .form-title { font-size: 30px; }
  .badge { width: 48px; height: 48px; border-radius: 14px; }
  .badge-v { font-size: 20px; }
  .dept-pill { font-size: 11.5px; padding: 6px 14px; }
}
</style>
</head>
<body>

<canvas id="pCanvas"></canvas>
<div class="orbs">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>

<div class="wrapper">

  <!-- COLLEGE HEADER -->
  <div class="college-header">
    <div class="college-logo-row">
      <div class="badge"><span class="badge-v">V</span></div>
      <div class="college-name-col">
        <div class="college-name">Velammal College of Engineering<br>&amp; Technology</div>
        <div class="college-location">Madurai, Tamil Nadu — Est. 1996</div>
      </div>
    </div>

      <span class="dept-dot"></span>

  <!-- CARD -->
  <div class="card">
    <div class="card-body">

      <div class="form-greeting">

      </div>
      <h1 class="form-title">Sign in to<br>your account</h1>
      

      

      <div id="errBox" class="err-box" role="alert">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

      </div>

      <div class="field">
        <div class="field-wrap">
          <input type="text" id="lgId" class="field-input" placeholder="x" autocomplete="username">

      </div>

      <div class="field">

          <input type="password" id="lgPwd" class="field-input" placeholder="x" autocomplete="current-password" style="padding-right:48px">
          <label class="field-label" for="lgPwd">Password</label>
          <div class="field-bar"></div>
          <button class="eye-btn" type="button" onclick="togglePwd()" aria-label="Toggle password">
            <svg id="eyeOpen" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeClosed" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <button class="btn" id="lgBtn" onclick="handleLogin()">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>

      <div class="card-footer">
        <div class="fitem">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Secured
        </div>
        <div class="fsep"></div>
        <div class="fitem">VCET-IT Only</div>
        <div class="fsep"></div>
        <div class="fitem">© 2026</div>
      </div>

    </div>
  </div>

  <!-- PORTAL ROLE CHIPS 
  <div class="portal-tags">
    <div class="ptag">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Student
    </div>
    <div class="ptag">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Mentor
    </div>
    <div class="ptag">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Chairperson
    </div>
    <div class="ptag">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      HoD
    </div>
  </div> -->

</div>

<script>
/* ══════════════════════════════════════
   PARTICLE FLOW ANIMATION
══════════════════════════════════════ */
(function () {
  const canvas = document.getElementById('pCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H;

  const PALETTE = [
    { r:201, g:151, b:58  },
    { r:44,  g:74,  b:62  },
    { r:79,  g:125, b:106 },
    { r:224, g:176, b:90  },
    { r:184, g:92,  b:56  },
  ];

  class Node {
    constructor() { this.reset(true); }
    reset(init) {
      this.x = Math.random() * (W || window.innerWidth);
      this.y = init ? Math.random() * (H || window.innerHeight) : -8;
      const c = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      this.r = c.r; this.g = c.g; this.b = c.b;
      this.alpha = 0.18 + Math.random() * 0.38;
      this.size  = 1.2 + Math.random() * 2.2;
      this.vx    = (Math.random() - 0.5) * 0.6;
      this.vy    = 0.25 + Math.random() * 0.55;
      this.wave      = Math.random() * Math.PI * 2;
      this.waveAmp   = 0.4 + Math.random() * 0.8;
      this.waveSpeed = 0.008 + Math.random() * 0.012;
    }
    update() {
      this.wave += this.waveSpeed;
      this.x += this.vx + Math.sin(this.wave) * this.waveAmp;
      this.y += this.vy;
      if (this.y > H + 10 || this.x < -20 || this.x > W + 20) this.reset(false);
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${this.alpha})`;
      ctx.fill();
    }
  }

  class FlowLine {
    constructor() { this.reset(true); }
    reset(init) {
      this.x = Math.random() * (W || window.innerWidth);
      this.y = init ? Math.random() * (H || window.innerHeight) : -20;
      const c = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      this.r = c.r; this.g = c.g; this.b = c.b;
      this.alpha  = 0.05 + Math.random() * 0.1;
      this.length = 30 + Math.random() * 70;
      this.speed  = 0.5 + Math.random() * 1.2;
      this.vx     = (Math.random() - 0.5) * 0.4;
      this.wave      = Math.random() * Math.PI * 2;
      this.waveAmp   = 0.3 + Math.random() * 0.7;
      this.waveSpeed = 0.006 + Math.random() * 0.01;
    }
    update() {
      this.wave += this.waveSpeed;
      this.x += this.vx + Math.sin(this.wave) * this.waveAmp;
      this.y += this.speed;
      if (this.y - this.length > H + 10 || this.x < -20 || this.x > W + 20) this.reset(false);
    }
    draw() {
      const grad = ctx.createLinearGradient(this.x, this.y - this.length, this.x, this.y);
      grad.addColorStop(0, `rgba(${this.r},${this.g},${this.b},0)`);
      grad.addColorStop(0.5, `rgba(${this.r},${this.g},${this.b},${this.alpha})`);
      grad.addColorStop(1, `rgba(${this.r},${this.g},${this.b},0)`);
      ctx.beginPath();
      ctx.moveTo(this.x, this.y - this.length);
      ctx.lineTo(this.x, this.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }
  }

  function drawConnections(nodes) {
    const MAX = 110;
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < MAX) {
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = `rgba(201,151,58,${(1 - d/MAX) * 0.07})`;
          ctx.lineWidth = 0.8; ctx.stroke();
        }
      }
    }
  }

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  let nodes = [], lines = [];
  function init() {
    const nc = Math.min(55, Math.floor(W * H / 20000));
    const lc = Math.min(20, Math.floor(W * H / 55000));
    nodes = Array.from({ length: nc }, () => new Node());
    lines = Array.from({ length: lc }, () => new FlowLine());
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    lines.forEach(l => { l.update(); l.draw(); });
    drawConnections(nodes);
    nodes.forEach(n => { n.update(); n.draw(); });
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => { resize(); init(); });
  resize(); init(); loop();
})();

   CONFIG
══════════════════════════════════════ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyFxB9GYKaukR1A3AX3wK7C9hswvAbsgU4adirRcEMhFNDitCi57v6SiL7QR9c874zjww/exec';

const PORTAL_MAP = {
  Student     : 'student.html',
  Mentor      : 'mentor.html',
  Chairperson : 'chairperson.html',
  HoD         : 'hod.html'
};

function showError(msg) {
  const b = document.getElementById('errBox');
  document.getElementById('errMsg').textContent = msg;
  b.classList.remove('show'); void b.offsetWidth; b.classList.add('show');
}
function hideError() { document.getElementById('errBox').classList.remove('show'); }

function togglePwd() {
  const i = document.getElementById('lgPwd');
  const o = document.getElementById('eyeOpen'), c = document.getElementById('eyeClosed');
  if (i.type === 'password') { i.type = 'text'; o.style.display = 'none'; c.style.display = 'block'; }
  else { i.type = 'password'; o.style.display = 'block'; c.style.display = 'none'; }
}

async function gasCall(action, data) {
  const res = await fetch(GAS_URL, {
    method: 'POST', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action, data })
  });
  if (!res.ok) throw new Error('Server error: HTTP ' + res.status);
  const json = await res.json();
  if (!json.ok) throw new Error(json.msg || 'Request failed');
  return json;
}

async function handleLogin() {
  const loginId  = document.getElementById('lgId').value.trim();
  const password = document.getElementById('lgPwd').value.trim();
  hideError();
  if (!loginId || !password) { showError('Please enter your Login ID and Password.'); return; }

  const btn = document.getElementById('lgBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Authenticating…';

  try {
    const authRes = await gasCall('login', { loginId, password });
    const user = authRes.user;
    const portal = PORTAL_MAP[user.role];
    if (!portal) throw new Error(`Unknown role "${user.role}".`);

    if (user.role === 'Student') {
      const studentName = (user.name || user.Name || user.StudentName || '').trim();
      if (!studentName) throw new Error('Login succeeded but student name is missing.');
      btn.innerHTML = '<div class="spinner"></div> Loading profile…';
      let profile = {};
      try {
        const pr = await gasCall('student.getProfileByName', { name: studentName });
        profile = pr.data || {};
      } catch (e) {
        throw new Error(`Authenticated as "${studentName}" but profile not found. (${e.message})`);
      }
      const rn = (profile.RegNo || '').trim();
      if (!rn) throw new Error(`Profile found for "${studentName}" but RegNo is blank.`);
      user.RegNo = rn;
      user.StudentName = profile.StudentName || studentName;
      user.name = user.StudentName;
      user.Year = profile.Year || user.Year || '';
      user.Section = profile.Section || user.Section || '';
      user.MentorID = profile.MentorID || user.MentorID || '';
      user.Department = profile.Department || user.Department || 'Information Technology';
      Object.assign(user, profile);
      user.loginId = loginId;
    }

    sessionStorage.setItem('vcet_user', JSON.stringify(user));
    btn.style.background = 'linear-gradient(135deg,#2e9e6b,#3fbf87)';
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Access Granted`;
    setTimeout(() => { window.location.href = portal; }, 680);

  } catch (e) {
    showError(e.message || 'Login failed. Please check your credentials.');
    btn.disabled = false;
    btn.style.background = '';
    btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In`;
  }
}

document.getElementById('lgId').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('lgPwd').focus(); });
document.getElementById('lgPwd').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
