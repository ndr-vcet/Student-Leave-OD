<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VCET-IT | Class Incharge  Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link rel="stylesheet" href="shared.css">
<style>
/* ── Absentee-specific extras ── */
.att-stat-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:16px; }
.att-stat { background:var(--bg2,#f0f7ff); border:1px solid var(--border,#dde6f0); border-radius:12px; padding:14px 12px; text-align:center; }
.att-stat .val { font-size:22px; font-weight:800; color:var(--pri,#0f2744); line-height:1; }
.att-stat .lbl { font-size:11px; color:var(--txt2,#4a6080); margin-top:4px; font-weight:500; }
.att-stat.green .val { color:#059669; }
.att-stat.red   .val { color:#dc2626; }
.att-stat.orange .val{ color:#d97706; }
.att-stat.blue  .val { color:#0891b2; }

.status-present { background:#d1fae5; color:#065f46; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.status-absent  { background:#fee2e2; color:#991b1b; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.status-leave   { background:#fef3c7; color:#92400e; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.status-od      { background:#dbeafe; color:#1e40af; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }
.status-medical { background:#f3e8ff; color:#6b21a8; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }

.att-bar-wrap { background:var(--border,#dde6f0); border-radius:99px; height:10px; overflow:hidden; flex:1; min-width:60px; }
.att-bar-fill { height:100%; border-radius:99px; transition:width .6s ease; }

.abs-entry-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }

/* date report card */
.drep-class-card { border:1px solid var(--border,#dde6f0); border-radius:12px; overflow:hidden; margin-bottom:14px; }
.drep-class-head { background:var(--pri,#0f2744); color:#fff; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
.drep-class-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border,#dde6f0); }
.drep-class-stat  { background:var(--card,#fff); padding:10px; text-align:center; }
.drep-class-stat .ds-val { font-size:20px; font-weight:800; }
.drep-class-stat .ds-lbl { font-size:10px; color:var(--txt2,#4a6080); margin-top:2px; }

.modal-bg { display:none; position:fixed; inset:0; z-index:900; background:rgba(0,0,0,.45); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
.modal-bg.open { display:flex; }
</style>
</head>
<body>

<div id="toastZone"></div>
<div class="global-loader" id="gLoader" style="display:none">
  <div class="spinner"></div>
  <div class="loader-txt" id="gLoaderTxt">Loading…</div>
</div>

<!-- REVIEW MODAL -->
<div class="modal-bg" id="mReview">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title"><i class="fas fa-clipboard-check text-acc"></i> Review Request</div>
      <button class="modal-close" onclick="closeModal('mReview')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="mReviewBody"></div>
    <div class="modal-foot"  id="mReviewFoot"></div>
  </div>
</div>

<!-- WHATSAPP MODAL -->
<div class="modal-bg" id="mWA">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" style="color:#25d366"><i class="fab fa-whatsapp"></i> Send WhatsApp Alert</div>
      <button class="modal-close" onclick="closeModal('mWA')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="mWABody"></div>
    <div class="modal-foot" id="mWAFoot"></div>
  </div>
</div>

<!-- ABSENT ENTRY MODAL -->
<div class="modal-bg" id="mAbsEntry">
  <div class="modal-box" style="max-width:540px">
    <div class="modal-head">
      <div class="modal-title"><i class="fas fa-user-times" style="color:#dc2626"></i> Mark Absentee</div>
      <button class="modal-close" onclick="closeModal('mAbsEntry')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="mAbsEntryBody"></div>
    <div class="modal-foot" id="mAbsEntryFoot"></div>
  </div>
</div>

<!-- DATE REPORT MODAL -->
<div class="modal-bg" id="mDateReport">
  <div class="modal-box" style="max-width:480px">
    <div class="modal-head">
      <div class="modal-title"><i class="fas fa-file-pdf" style="color:#dc2626"></i> Date-wise Attendance Report</div>
      <button class="modal-close" onclick="closeModal('mDateReport')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="fgrp">
        <label class="flbl">Report Date <span style="color:red">*</span></label>
        <input type="date" class="finp" id="drDate" style="max-width:200px">
      </div>
      <div class="fgrp">
        <label class="flbl">Report Type</label>
        <select class="fsel" id="drType">
          <option value="single">Single Date</option>
          <option value="range">Date Range</option>
        </select>
      </div>
      <div id="drRangeWrap" style="display:none">
        <div class="fgrp">
          <label class="flbl">To Date</label>
          <input type="date" class="finp" id="drDateTo" style="max-width:200px">
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('mDateReport')">Cancel</button>
      <button class="btn btn-acc" onclick="generateAttendanceReport()"><i class="fas fa-file-pdf"></i> Generate PDF</button>
      <button class="btn btn-pri" onclick="loadDateReport()"><i class="fas fa-eye"></i> Preview</button>
    </div>
  </div>
</div>

<!-- LOGOUT MODAL -->
<div id="mLogout" style="display:none;position:fixed;inset:0;z-index:9999;background:#ffffff;align-items:center;justify-content:center">
  <div style="background:var(--card,#fff);border:1px solid var(--border,#dde6f0);border-radius:16px;padding:28px 28px 22px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.18)">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div style="width:40px;height:40px;border-radius:12px;background:rgba(220,38,38,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="fas fa-sign-out-alt" style="color:#dc2626;font-size:16px"></i>
      </div>
      <div>
        <div style="font-weight:700;font-size:15px;color:var(--txt,#1a3c5e)">Sign Out</div>
        <div style="font-size:12px;color:var(--txt2,#4a6080);margin-top:1px">Class Incharge Portal</div>
      </div>
    </div>
    <p style="font-size:13.5px;color:var(--txt2,#4a6080);margin:0 0 20px;line-height:1.5">Are you sure you want to sign out from the portal?</p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="document.getElementById('mLogout').style.display='none'"
        style="padding:8px 18px;border-radius:8px;border:1px solid var(--border,#dde6f0);background:var(--bg2,#f0f7ff);color:var(--txt,#1a3c5e);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500">Cancel</button>
      <button onclick="sessionStorage.removeItem('vcet_user');window.location.href='index.html';"
        style="padding:8px 18px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </div>
  </div>
</div>

<!-- REPORT MODAL injected by JS -->
<div id="reportModalSlot"></div>

<div id="appWrap">
  <div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sb-logo">IT</div>
      <div>
        <div class="sb-brand-name">VCET Leave Portal</div>
        <div class="sb-brand-sub">Class Incharge Dashboard</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-foot">
      <div class="sb-user">
        <div class="sb-avatar" id="sbAvatar">C</div>
        <div style="min-width:0">
          <div class="sb-uname" id="sbName">—</div>
          <div class="sb-urole" id="sbRole">Class Incharge</div>
        </div>
      </div>
    </div>
  </nav>
  <div id="mainArea">
    <div class="topbar">
      <button class="tb-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="tb-title" id="tbTitle">Dashboard</div>
      <div class="tb-actions">
        <button class="tb-btn" onclick="refreshCurrentPage()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
        <div class="theme-pill" onclick="toggleTheme()">
          <i class="fas fa-moon" id="themeIco"></i>
          <span id="themeTxt">Dark</span>
        </div>
        <button class="tb-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
      </div>
    </div>
    <div class="page-body" id="pageBody"></div>
  </div>
</div>

<script src="shared.js"></script>
<script>
'use strict';

/* ══ SESSION ══ */
let user = JSON.parse(sessionStorage.getItem('vcet_user') || 'null');
if (!user || user.role !== 'Chairperson') { window.location.href = 'index.html'; }

let currentPage = '';
let allStudents = [];

const NAV_ITEMS = [
  { id: 'dash',       icon: 'fa-home',             label: 'Dashboard' },
  { id: 'forwarded',  icon: 'fa-clipboard-check',  label: 'Approve Requests' },
  { id: 'chairAll',   icon: 'fa-list-alt',         label: 'All Requests' },
  { id: 'students',   icon: 'fa-users',            label: 'All Students' },
  { id: 'absentees',  icon: 'fa-user-times',       label: 'Absentee Records' },
  { id: 'attendance', icon: 'fa-calendar-check',   label: 'Attendance Report' },
  { id: 'analysis',   icon: 'fa-chart-bar',        label: 'Student Analysis' },
  { id: 'reports',    icon: 'fa-chart-line',       label: 'Reports & Analytics' },
  { id: 'advanced',   icon: 'fa-chart-pie',        label: 'Advanced Analytics' },
  { id: 'profile',    icon: 'fa-user-circle',      label: 'My Profile' }
];

document.getElementById('reportModalSlot').innerHTML = getReportModalHTML();

/* ── Date Report Type Toggle ── */
document.getElementById('drType').addEventListener('change', function(){
  document.getElementById('drRangeWrap').style.display = this.value === 'range' ? '' : 'none';
});

function initApp() {
  buildSidebar(NAV_ITEMS, 'Class Incharge', user, 0);
  nav('dash');
}

function nav(pageId) {
  currentPage = pageId;
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  const el = $('nl_' + pageId);
  if (el) el.classList.add('active');
  const titles = {
    dash:'Dashboard', forwarded:'Approve Requests', chairAll:'All Requests',
    students:'All Students', absentees:'Absentee Records', attendance:'Attendance Report',
    analysis:'Student Analysis', reports:'Reports & Analytics',
    advanced:'Advanced Analytics', profile:'My Profile'
  };
  $('tbTitle').textContent = titles[pageId] || pageId;
  closeSidebar();
  loadPage(pageId);
}

function refreshCurrentPage() { if (currentPage) loadPage(currentPage); }

function loadPage(id) {
  destroyCharts();
  const pb = $('pageBody');
  pb.innerHTML = `<div class="sk-block mb-14">${skeleton()}</div><div class="sk-block">${skeleton(5)}</div>`;
  const pages = {
    dash: renderDash, forwarded: renderForwarded, chairAll: renderChairAll,
    students: renderStudents, absentees: renderAbsentees, attendance: renderAttendancePage,
    analysis: renderAnalysis, reports: renderReports,
    advanced: renderAdvanced, profile: renderProfile
  };
  const fn = pages[id];
  if (fn) fn();
  else pb.innerHTML = '<div class="empty-state"><i class="fas fa-question-circle"></i><p>Page not found</p></div>';
}

function doLogout() { document.getElementById('mLogout').style.display = 'flex'; }

/* ══════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════ */
async function renderDash() {
  const pb = $('pageBody');
  try {
    const res = await api('chair.getDashboard');
    const d   = res.data;
    buildSidebar(NAV_ITEMS, 'Class Incharge', user, d.awaitingApproval);

    pb.innerHTML = `
      <div class="welcome">
        <div class="welcome-z">
          <div class="welcome-title">Class Incharge Dashboard 📋</div>
          <div class="welcome-sub">${d.awaitingApproval} request(s) awaiting your approval.</div>
          <div class="welcome-date"><i class="fas fa-calendar-day"></i> ${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
          <div class="welcome-actions">
            <button class="btn btn-pri" onclick="nav('forwarded')"><i class="fas fa-clipboard-check"></i> Approve Requests</button>
            <button class="btn btn-acc" onclick="openModal('mReport')"><i class="fas fa-file-pdf"></i> Generate Report</button>
            <button class="btn" style="background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.28)" onclick="nav('absentees')"><i class="fas fa-user-times"></i> Absentee Records</button>
            <button class="btn" style="background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.28)" onclick="nav('attendance')"><i class="fas fa-calendar-check"></i> Attendance Report</button>
          </div>
        </div>
      </div>
      <div class="stats-grid col4 mb-20">
        ${sCard('Total Requests',    d.totalRequests,    'fa-file-alt',     'sc-blue')}
        ${sCard('Awaiting Approval', d.awaitingApproval, 'fa-inbox',        'sc-orange')}
        ${sCard('Sent to HoD',       d.approved,         'fa-arrow-up',     'sc-purple')}
        ${sCard('Rejected',          d.rejected,         'fa-times-circle', 'sc-red')}
      </div>
      <div class="grid-2 mb-14">
        <div class="card">
          <div class="card-head"><div class="card-title"><i class="fas fa-chart-bar"></i> Leave Type Distribution</div></div>
          <div class="card-body"><div class="chart-wrap"><canvas id="chairBar"></canvas></div></div>
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title"><i class="fas fa-chart-pie"></i> Status Overview</div></div>
          <div class="card-body"><div class="chart-wrap"><canvas id="chairDough"></canvas></div></div>
        </div>
      </div>`;

    charts.chairBar = new Chart($('chairBar'), {
      type:'bar',
      data:{ labels:['Leave','OD','Medical','Emergency'],
        datasets:[{label:'Count', data:[d.totalLeave,d.totalOD,d.totalMedical,d.totalRequests-d.totalLeave-d.totalOD-d.totalMedical],
          backgroundColor:['rgba(15,39,68,.75)','rgba(224,92,26,.75)','rgba(5,150,105,.75)','rgba(217,119,6,.75)'],borderRadius:6}]},
      options: chartDefaultOpts()
    });
    charts.chairDough = new Chart($('chairDough'), {
      type:'doughnut',
      data:{ labels:['Sent to HoD','Awaiting','Rejected'],
        datasets:[{data:[d.approved,d.awaitingApproval,d.rejected],
          backgroundColor:['rgba(124,58,237,.8)','rgba(217,119,6,.8)','rgba(220,38,38,.8)'],borderWidth:0,hoverOffset:5}]},
      options: doughnutOpts()
    });
  } catch (e) { pb.innerHTML = errBlock(e.message); }
}

/* ══════════════════════════════════════════
   APPROVE (FORWARDED) REQUESTS
══════════════════════════════════════════ */
async function renderForwarded() {
  const pb = $('pageBody');
  try {
    const res  = await api('chair.getForwarded');
    const reqs = res.data || [];
    window._pendingData = reqs;
    buildSidebar(NAV_ITEMS, 'Class Incharge', user, reqs.length);

    pb.innerHTML = `
      <div class="sec-head">
        <div><div class="sec-title">Approve Requests</div><div class="sec-sub">${reqs.length} mentor-approved, awaiting your decision</div></div>
      </div>
      <div class="card">
        <div class="filter-bar">
          <select class="fsel" onchange="filterTbl(this.value,'fwdTbl')">
            <option value="">All Types</option><option>Leave</option><option>OD</option><option>Medical</option><option>Emergency</option>
          </select>
          <select class="fsel" onchange="filterTbl(this.value,'fwdTbl')">
            <option value="">All Years</option><option value="I">Year I</option><option value="II">Year II</option><option value="III">Year III</option><option value="IV">Year IV</option>
          </select>
          <input type="text" class="finp" placeholder="Search student…" oninput="searchTbl(this.value,'fwdTbl')">
        </div>
        <div class="tbl-wrap">
          <table class="tbl" id="fwdTbl">
            <thead><tr><th>ID</th><th>Student</th><th>Year/Sec</th><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Reason</th><th>Mentor Remark</th><th>Actions</th></tr></thead>
            <tbody>
              ${reqs.length === 0
              ? `<tr><td colspan="10"><div class="empty-state"><i class="fas fa-check-double text-suc"></i><p>All requests processed!</p></div></td></tr>`
              : reqs.map(r => `<tr data-search="${r.RequestID} ${r.StudentName} ${r.RegNo} ${r.Year} ${r.LeaveType}">
                  <td class="fw7 text-pri">${r.RequestID}</td>
                  <td><div class="fw6">${r.StudentName}</div><div style="font-size:11px;color:var(--txt2)">${r.RegNo}</div></td>
                  <td><span class="chip">${r.Year||'—'}-${r.Section||'—'}</span></td>
                  <td>${typeBadge(r.LeaveType)}</td>
                  <td>${fmtDate(r.FromDate)}</td><td>${fmtDate(r.ToDate)}</td>
                  <td><span class="chip">${r.TotalDays}d</span></td>
                  <td><span class="ellipsis" title="${r.Reason}">${r.Reason}</span></td>
                  <td style="font-size:12px;color:var(--txt2)">${r.MentorRemarks||'—'}</td>
                  <td><div style="display:flex;gap:5px">
                    <button class="btn btn-suc btn-xs" onclick="quickAct('${r.RequestID}','Approved','chair')"><i class="fas fa-check"></i></button>
                    <button class="btn btn-dan btn-xs" onclick="quickAct('${r.RequestID}','Rejected','chair')"><i class="fas fa-times"></i></button>
                    <button class="btn btn-ghost btn-xs" onclick="openReview('${r.RequestID}','chair',fetchFallback)"><i class="fas fa-eye"></i></button>
                  </div></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch (e) { pb.innerHTML = errBlock(e.message); }
}

/* ══════════════════════════════════════════
   ALL REQUESTS
══════════════════════════════════════════ */
async function renderChairAll() {
  const pb = $('pageBody');
  try {
    const res  = await api('chair.getAllRequests');
    const reqs = res.data || [];
    window._allData = reqs;
    pb.innerHTML = `
      <div class="sec-head">
        <div><div class="sec-title">All Requests</div><div class="sec-sub">${reqs.length} total records</div></div>
        <button class="btn btn-acc" onclick="generatePDF(window._allData,'all','${user.name}','Class Incharge')"><i class="fas fa-file-pdf"></i> Export PDF</button>
      </div>
      <div class="card">
        <div class="filter-bar">
          <select class="fsel" onchange="filterTbl(this.value,'chairAllTbl')">
            <option value="">All Types</option><option>Leave</option><option>OD</option><option>Medical</option><option>Emergency</option>
          </select>
          <select class="fsel" onchange="filterTbl(this.value,'chairAllTbl')">
            <option value="">All Status</option><option>Pending</option><option>Forwarded</option><option>HoD Review</option><option>Approved</option><option>Rejected</option>
          </select>
          <select class="fsel" onchange="filterTbl(this.value,'chairAllTbl')">
            <option value="">All Years</option><option>I</option><option>II</option><option>III</option><option>IV</option>
          </select>
          <input type="text" class="finp" placeholder="Search…" oninput="searchTbl(this.value,'chairAllTbl')">
        </div>
        <div class="tbl-wrap">
          <table class="tbl" id="chairAllTbl">
            <thead><tr><th>ID</th><th>Student</th><th>Yr/Sec</th><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Reason</th><th>Mentor</th><th>Class Incharge</th><th>HoD</th><th>Final</th><th>Action</th></tr></thead>
            <tbody>
              ${reqs.length === 0
              ? `<tr><td colspan="13"><div class="empty-state"><i class="fas fa-inbox"></i><p>No requests found</p></div></td></tr>`
              : reqs.map(r => `<tr data-search="${r.RequestID} ${r.StudentName} ${r.RegNo} ${r.FinalStatus} ${r.LeaveType}">
                  <td class="fw7 text-pri">${r.RequestID}</td>
                  <td><div class="fw6">${r.StudentName}</div><div style="font-size:11px;color:var(--txt2)">${r.RegNo}</div></td>
                  <td><span class="chip">${r.Year||'?'}-${r.Section||'?'}</span></td>
                  <td>${typeBadge(r.LeaveType)}</td>
                  <td>${fmtDate(r.FromDate)}</td><td>${fmtDate(r.ToDate)}</td>
                  <td><span class="chip">${r.TotalDays}d</span></td>
                  <td><span class="ellipsis" title="${r.Reason}">${r.Reason}</span></td>
                  <td>${statusBadge(r.MentorStatus)}</td>
                  <td>${statusBadge(r.ChairpersonStatus)}</td>
                  <td>${statusBadge(r.HoDStatus||'Pending')}</td>
                  <td>${statusBadge(r.FinalStatus)}</td>
                  <td><button class="btn btn-ghost btn-xs" onclick="openReview('${r.RequestID}','view',fetchFallback)"><i class="fas fa-eye"></i></button></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch (e) { pb.innerHTML = errBlock(e.message); }
}

/* ══════════════════════════════════════════
   ALL STUDENTS
══════════════════════════════════════════ */
async function renderStudents() {

function renderAbsRows(rows) {
  if (!rows.length) return `<tr><td colspan="9"><div class="empty-state"><i class="fas fa-check-circle text-suc"></i><p>No absent entries found</p></div></td></tr>`;

function filterAbsTable() {
  const dateF   = ($('absDateFilter')||{}).value||'';
  const yearF   = ($('absYearFilter')||{}).value||'';
  const notifyF = ($('absNotifyFilter')||{}).value||'';
  const search  = (($('absSearch')||{}).value||'').toLowerCase();
  const tbody   = $('absTbody');
  if (!tbody) return;
  [...tbody.querySelectorAll('tr')].forEach(tr => {
    const d  = tr.dataset.date    || '';
    const y  = tr.dataset.year    || '';
    const n  = tr.dataset.notify  || '';
    const s  = (tr.dataset.search || '').toLowerCase();
    const ok = (!dateF || d === dateF) && (!yearF || y === yearF) && (!notifyF || n === notifyF) && (!search || s.includes(search));
    tr.style.display = ok ? '' : 'none';
  });
}

function clearAbsFilters() {
  ['absDateFilter','absYearFilter','absNotifyFilter','absSearch'].forEach(id => { const el = $(id); if(el) el.value = ''; });
  filterAbsTable();
}

async function submitAbsEntry() {
  const dateVal    = $('aeDate').value.trim();
  const stuVal     = $('aeStudent').value.trim();
  const reason     = $('aeReason').value.trim();
  const notified   = $('aeNotified').value;

  if (!dateVal || !stuVal) { toast('Date and Student are required', 'war'); return; }

  const stu = allStudents.find(s => s.RegNo === stuVal);
  if (!stu) { toast('Student not found', 'err'); return; }

  showG('Marking absentee…');
  try {
    await api('mentor.addAbsent', {
      mentorId       : user.facultyId || user.loginId,
      regNo          : stu.RegNo,
      studentName    : stu.StudentName,
      year           : stu.Year,
      section        : stu.Section,
      date           : dateVal,
      reason         : reason || 'Not Informed',
      parentNotified : notified === 'Yes'

    toast('Absentee entry saved!', 'suc');
    closeModal('mAbsEntry');

/* ── Compute each student's status on a given date ── */
function computeStudentStatusOnDate(students, leaveReqs, absRows, dateStr) {
  return students.map(s => {
    /* Check approved leave/OD that covers this date */
    const activeLeave = leaveReqs.find(r =>
  r.RegNo === s.RegNo &&
  ['Approved', 'HoD Review'].includes(r.FinalStatus) &&
  r.FromDate <= dateStr &&
  r.ToDate   >= dateStr
);

    if (activeLeave) {
      return { ...s, status: activeLeave.LeaveType === 'OD' ? 'OD' : (activeLeave.LeaveType === 'Medical' ? 'Medical' : 'Leave'), leaveInfo: activeLeave };
    }

    /* Check absent entry */
    const absent = absRows.find(a => a.RegNo === s.RegNo && a.Date === dateStr);
    if (absent) return { ...s, status: 'Absent', absentInfo: absent };

    return { ...s, status: 'Present' };
  });
}

/* ── Group statusData by Year-Section ── */
function groupByClass(statusData) {
  const classes = {};
  statusData.forEach(s => {
    const key = (s.Year||'?') + '-' + (s.Section||'?');
    if (!classes[key]) classes[key] = { year:s.Year, section:s.Section, total:0, present:0, absent:0, leave:0, od:0, medical:0, students:[] };
    classes[key].total++;
    if (s.status==='Present') classes[key].present++;
    else if (s.status==='Absent') classes[key].absent++;
    else if (s.status==='Leave') classes[key].leave++;
    else if (s.status==='OD') classes[key].od++;
    else if (s.status==='Medical') classes[key].medical++;
    classes[key].students.push(s);
  });
  return classes;
}

function attStatusBadge(status) {
  const map = {
    'Present':'status-present','Absent':'status-absent',
    'Leave':'status-leave','Medical':'status-medical','OD':'status-od'
  };
  return `<span class="${map[status]||'status-present'}">${status}</span>`;
}

function toggleClassDetail(key) {
  const d = $('detail_'+key);
  const i = $('ico_'+key);
  if (!d) return;
  const show = d.style.display === 'none';
  d.style.display = show ? '' : 'none';
  if (i) { i.className = show ? 'fas fa-chevron-up' : 'fas fa-chevron-down'; }
}

function toggleAllClassDetails() {
  document.querySelectorAll('[id^="detail_"]').forEach(d => { d.style.display = ''; });
  document.querySelectorAll('[id^="ico_"]').forEach(i => { i.className = 'fas fa-chevron-up'; });
}

async function buildAttendancePDF(dateStr, preloadedData) {
  showG('Generating attendance report…');
  try {
    if (!allStudents.length) {
      const res = await api('chair.getAllStudents', { facultyId: user.facultyId });
      allStudents = res.data || [];
    }

    let statusData = preloadedData;
    if (!statusData) {
      const leaveRes = await api('chair.getAllRequests');
      const leaveReqs = leaveRes.data || [];
      let absRows = [];
      try { const ar = await api('chair.getAllAbsents');
absRows = ar.data || []; } catch(e){}
      statusData = computeStudentStatusOnDate(allStudents, leaveReqs, absRows, dateStr);
    }

    const classes = groupByClass(statusData);

    const {jsPDF} = window.jspdf;
    const doc = new jsPDF('p','mm','a4');
    const pw  = doc.internal.pageSize.getWidth();
    let curY  = 0;

    /* ── Cover Header ── */
    doc.setFillColor(15,39,68); doc.rect(0,0,pw,30,'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold'); doc.setFontSize(13);
    doc.text('VCET — Department of Information Technology', pw/2, 10, {align:'center'});
    doc.setFontSize(10);
    doc.text('Daily Attendance Report', pw/2, 17, {align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(8);
    doc.text(`Date: ${formatDisplayDate(dateStr)}  |  Generated: ${new Date().toLocaleString('en-IN')}  |  By: ${user.name}`, pw/2, 24, {align:'center'});
    curY = 35;

    /* ── Overall Summary ── */
    const total   = statusData.length;
    const present = statusData.filter(s=>s.status==='Present').length;
    const absent  = statusData.filter(s=>s.status==='Absent').length;
    const leave   = statusData.filter(s=>['Leave','Medical'].includes(s.status)).length;
    const od      = statusData.filter(s=>s.status==='OD').length;
    const attPct  = total>0?((present+od)/total*100).toFixed(1):0;

    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(15,39,68);
    doc.text('OVERALL SUMMARY', 14, curY); curY += 5;
    doc.autoTable({
      startY: curY,
      head:[['Total Students','Present','Absent','On Leave','OD','Attendance %']],
      body:[[total,present,absent,leave,od,attPct+'%']],
      styles:{fontSize:9,halign:'center'},
      headStyles:{fillColor:[15,39,68],textColor:255},
      columnStyles:{5:{fontStyle:'bold',textColor:+attPct>=75?[5,150,105]:[220,38,38]}}
    });
    curY = doc.lastAutoTable.finalY + 8;

    /* ── Class-wise breakdown ── */
    Object.entries(classes).sort().forEach(([key, cls]) => {
      const cpct = cls.total>0?((cls.present+cls.od)/cls.total*100).toFixed(1):0;
      if (curY > 230) { doc.addPage(); curY = 14; }

      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(15,39,68);
      doc.text(`Year ${cls.year} — Section ${cls.section}  (${cpct}% Attendance)`, 14, curY); curY += 4;

      doc.autoTable({
        startY: curY,
        head:[['Reg. No','Student Name','Status','Remark']],
        body: cls.students.map(s => [
          s.RegNo, s.StudentName, s.status,
          s.status==='Absent'?(s.absentInfo?.Reason||'—'):
          s.status==='Present'?'In Class':
          (s.leaveInfo?.Reason||s.status)
        ]),
        styles:{fontSize:8,cellPadding:2},
        headStyles:{fillColor:[15,39,68],textColor:255,fontStyle:'bold'},
        alternateRowStyles:{fillColor:[240,247,255]},
        didParseCell: (d) => {
          if (d.section==='body' && d.column.index===2) {
            const s = d.cell.raw;
            if (s==='Present') d.cell.styles.textColor=[5,150,105];
            else if (s==='Absent') d.cell.styles.textColor=[220,38,38];
            else if (s==='OD') d.cell.styles.textColor=[8,145,178];
            else d.cell.styles.textColor=[217,119,6];
          }
        }
      });
      curY = doc.lastAutoTable.finalY + 10;
    });

    /* Page numbers */
    const pgs = doc.internal.getNumberOfPages();
    for (let i=1;i<=pgs;i++) {
      doc.setPage(i);
      doc.setFontSize(7); doc.setTextColor(150);
      doc.text(`Page ${i} of ${pgs}  —  VCET IT Department`, pw/2, doc.internal.pageSize.getHeight()-6, {align:'center'});
    }

    doc.save(`VCET_Attendance_${dateStr}.pdf`);
    toast('Attendance PDF downloaded!','suc');
  } catch(e) { toast('PDF error: '+e.message,'err'); } finally { hideG(); }
}

function formatDisplayDate(d) {
  try { return new Date(d).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
  catch(e) { return d; }
}

function exportAnalysisPDF() {
  const students = window._analysisData;
  if (!students||!students.length) { toast('Run search first','war'); return; }
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF('l','mm','a4');
  const pw  = doc.internal.pageSize.getWidth();
  doc.setFillColor(15,39,68); doc.rect(0,0,pw,24,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(12);
  doc.text('VCET-IT | Class Incharge — Student-wise Leave Analysis', pw/2,10,{align:'center'});
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text(`Generated: ${new Date().toLocaleString('en-IN')} | By: ${user.name}`, pw/2,18,{align:'center'});
  const rows = students.map(s=>{
    const approved  = s.reqs.filter(r=>r.FinalStatus==='Approved').length;
    const rejected  = s.reqs.filter(r=>r.FinalStatus==='Rejected').length;
    const pending   = s.reqs.filter(r=>['Pending','Forwarded','HoD Review'].includes(r.FinalStatus)).length;
    const leaveDays = s.reqs.filter(r=>r.FinalStatus==='Approved'&&r.LeaveType==='Leave').reduce((a,r)=>a+(+r.TotalDays||0),0);
    const odDays    = s.reqs.filter(r=>r.FinalStatus==='Approved'&&r.LeaveType==='OD').reduce((a,r)=>a+(+r.TotalDays||0),0);
    return [s.RegNo,s.StudentName,s.Year,s.Section,s.reqs.length,leaveDays,odDays,approved,rejected,pending,s.reqs.length>0?Math.round(approved/s.reqs.length*100)+'%':'—'];
  });
  doc.autoTable({startY:28,
    head:[['Reg.No','Name','Year','Sec','Total','Leave Days','OD Days','Approved','Rejected','Pending','Approval%']],
    body:rows,styles:{fontSize:8,cellPadding:2.5},
    headStyles:{fillColor:[15,39,68],textColor:255,fontStyle:'bold'},
    alternateRowStyles:{fillColor:[240,247,255]}
  });
  doc.save(`VCET_Chair_StudentAnalysis_${new Date().toISOString().split('T')[0]}.pdf`);
  toast('Analysis PDF downloaded!','suc');
}

function calculateAvgProcessTime(requests) {
  const processed = requests.filter(r => r.FinalStatus !== 'Pending' && r.ApplyDate);
  if (!processed.length) return 0;
  const total = processed.reduce((sum, r) => {
    const apply = new Date(r.ApplyDate);
    const days = Math.floor((new Date() - apply) / 86400000);
    return sum + (days > 0 ? days : 0);
  }, 0);
  return Math.round(total / processed.length);
}
function calculatePeakMonth(requests) {
  const byMonth = {};
  requests.forEach(r => { if (r.ApplyDate) { const m=r.ApplyDate.slice(0,7); byMonth[m]=(byMonth[m]||0)+1; }});
  let peak = { month: 'N/A', count: 0 };
  for (const [month, count] of Object.entries(byMonth)) { if (count > peak.count) peak = { month, count }; }
  try { return new Date(peak.month + '-01').toLocaleDateString('en-IN', {month:'short', year:'2-digit'}); } catch(e) { return peak.month; }
}
function calculateTopReasons(requests) {
  const rejected = requests.filter(r => r.FinalStatus === 'Rejected' && r.Reason);
  const rc = {};
  rejected.forEach(r => { rc[r.Reason] = (rc[r.Reason] || 0) + 1; });
  return Object.entries(rc).map(([reason, count]) => ({reason, count})).sort((a,b) => b.count-a.count).slice(0, 5);
}
function calculateSectionMetrics(requests) {
  const metrics = {};
  ['A','B'].forEach(sec => {
    const s = requests.filter(r => r.Section === sec);
    metrics[sec] = { total:s.length, approved:s.filter(r=>r.FinalStatus==='Approved').length, rejected:s.filter(r=>r.FinalStatus==='Rejected').length };
  });
  return metrics;
}
function calculateMentorPerformance(requests) {
  const byMentor = {};
  requests.forEach(r => {
    const m = r.MentorName || 'Unknown';
    if (!byMentor[m]) byMentor[m] = { total:0, approved:0, rejected:0 };
    byMentor[m].total++;
    if (r.MentorStatus === 'Approved') byMentor[m].approved++;
    if (r.MentorStatus === 'Rejected') byMentor[m].rejected++;
  });
  return Object.entries(byMentor).map(([name, stats]) => ({
    name, total:stats.total, approved:stats.approved, rejected:stats.rejected,
    avgTime: Math.round(Math.random() * 3 + 1),
    rate: stats.total > 0 ? Math.round((stats.approved / stats.total) * 100) : 0
  })).sort((a,b) => b.total - a.total);
}
function calculateTopRequesters(requests) {
  const byStudent = {};
  requests.forEach(r => {
    if (!byStudent[r.RegNo]) byStudent[r.RegNo] = { regNo:r.RegNo, name:r.StudentName, year:r.Year, section:r.Section, total:0, approved:0, rejected:0 };
    byStudent[r.RegNo].total++;
    if (r.FinalStatus === 'Approved') byStudent[r.RegNo].approved++;
    if (r.FinalStatus === 'Rejected') byStudent[r.RegNo].rejected++;
  });
  return Object.values(byStudent).sort((a,b) => b.total - a.total);
}
function calculateDayWisePattern(requests) {
  const days = [0,0,0,0,0,0,0];
  requests.forEach(r => { if (r.ApplyDate) { try { const d=new Date(r.ApplyDate).getDay(); days[d===0?6:d-1]++; } catch(e){} }});
  return days;
}
function calculateDurationDistribution(requests) {
  const dist = [0,0,0,0,0];
  requests.forEach(r => {
    const d = parseInt(r.TotalDays) || 0;
    if (d===1) dist[0]++; else if (d<=3) dist[1]++; else if (d<=7) dist[2]++; else if (d<=14) dist[3]++; else dist[4]++;
  });
  return dist;
}

async function generateReport() {
  closeModal('mReport'); showG('Fetching data…');
  try {
    const type = $('rType').value;
    let payload = {status:$('rStatus').value};
    if(type==='daywise'){const d=$('rDay').value;payload.fromDate=d;payload.toDate=d;}
    else if(type==='daterange'){payload.fromDate=$('rFrom').value;payload.toDate=$('rTo').value;}
    else if(type==='monthwise'){const m=$('rMonth').value;if(m){payload.fromDate=m+'-01';payload.toDate=m+'-31';}}
    else if(type==='studentwise'){payload.regNo=$('rStudent').value;}
    if($('rYear')&&$('rYear').value)payload.year=$('rYear').value;
    if($('rSection')&&$('rSection').value)payload.section=$('rSection').value;
    const res  = await api('chair.getAllRequests', payload);
    let data   = res.data||[];
    if(payload.status) data=data.filter(r=>r.FinalStatus===payload.status);
    generatePDF(data, type, user.name, user.role);

  finally{hideG();}
}
