   DATE HELPERS  ← single source of truth
══════════════════════════════════════════ */

/**
 * Parse any date value and return a clean JS Date object
 * using ONLY the date portion (YYYY-MM-DD) to avoid UTC-offset issues.
 * Returns null if unparseable.
 */
function parseLocalDate(val) {
  if (!val) return null;
  const s = String(val).trim();
  // Already YYYY-MM-DD (possibly with T… suffix)
  const iso = s.slice(0, 10);
  if (/^\d{4}-\d{2}-\d{2}$/.test(iso)) {
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d);   // local midnight, no timezone offset
  }
  return null;
}

/**
 * Format any date value → DD/MM/YYYY  (Indian date, no time).
 * Works on ISO strings, JS Date objects, anything with a YYYY-MM-DD prefix.
 */
function fmtDatePDF(val) {
  if (!val) return '—';
  const dt = parseLocalDate(val);
  if (!dt) return String(val).slice(0, 10) || '—';
  const dd = String(dt.getDate()).padStart(2, '0');
  const mm = String(dt.getMonth() + 1).padStart(2, '0');
  const yy = dt.getFullYear();
  return `${dd}/${mm}/${yy}`;
}

/** Today as DD/MM/YYYY — no time component. */
function todayIN() {
  const n = new Date();
  return `${String(n.getDate()).padStart(2,'0')}/${String(n.getMonth()+1).padStart(2,'0')}/${n.getFullYear()}`;
}

/** Human-readable date for display (e.g. "Friday, 16 May 2025"). */
function fmtDateHuman(isoStr) {
  const dt = parseLocalDate(isoStr);
  if (!dt) return isoStr;
  return dt.toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

/* ══════════════════════════════════════════
   ATTENDANCE CALCULATION ENGINE
══════════════════════════════════════════ */

/**
 * Calculate attendance for a specific date
 * @param {string} dateStr - Date in YYYY-MM-DD format
 * @param {Array} students - Array of all students
 * @param {Array} requests - Array of all leave requests
 * @param {Array} absents - Array of all absent entries
 * @param {string} year - Optional year filter
 * @param {string} section - Optional section filter
 * @returns {Object} Attendance data grouped by class
 */
function calculateDatewiseAttendance(dateStr, students, requests, absents, year = '', section = '') {
  // Filter students by year/section if specified
  let classStudents = students;
  if (year) classStudents = classStudents.filter(s => s.Year === year);
  if (section) classStudents = classStudents.filter(s => s.Section === section);

  // Group by year and section
  const classes = {};
  classStudents.forEach(s => {
    const key = `${s.Year}-${s.Section}`;
    if (!classes[key]) {
      classes[key] = {
        year: s.Year,
        section: s.Section,
        totalStudents: 0,
        presentCount: 0,
        absentCount: 0,
        odCount: 0,
        leaveCount: 0,
        students: []
      };
    }
    classes[key].totalStudents++;
  });

  // Process each student
  classStudents.forEach(s => {
    const key = `${s.Year}-${s.Section}`;
    const cls = classes[key];

    // Check for approved leave/OD on this date
    const leaveOnDate = requests.find(r => {
      if (r.RegNo !== s.RegNo) return false;
      if (r.FinalStatus !== 'Approved') return false;
      
      const fromDate = parseLocalDate(r.FromDate);
      const toDate = parseLocalDate(r.ToDate);
      const checkDate = parseLocalDate(dateStr);
      
      return checkDate && fromDate && toDate && 
             checkDate >= fromDate && checkDate <= toDate;
    });

    if (leaveOnDate) {
      if (leaveOnDate.LeaveType === 'OD') {
        cls.odCount++;
        cls.presentCount++; // OD counts as present
        cls.students.push({
          RegNo: s.RegNo,
          StudentName: s.StudentName,
          year: s.Year,
          section: s.Section,
          status: 'OD',
          reason: leaveOnDate.Reason
        });
      } else {
        cls.leaveCount++;
        cls.students.push({
          RegNo: s.RegNo,
          StudentName: s.StudentName,
          year: s.Year,
          section: s.Section,
          status: 'Leave',
          reason: leaveOnDate.Reason
        });
      }
    } else {
      // Check if marked absent
      const absent = absents.find(a => {
        if (a.RegNo !== s.RegNo) return false;
        const absDate = parseLocalDate(a.Date);
        const checkDate = parseLocalDate(dateStr);
        return absDate && checkDate && absDate.getTime() === checkDate.getTime();
      });

      if (absent) {
        cls.absentCount++;
        cls.students.push({
          RegNo: s.RegNo,
          StudentName: s.StudentName,
          year: s.Year,
          section: s.Section,
          status: 'Absent',
          reason: absent.Reason || 'No reason provided'
        });
      } else {
        cls.presentCount++;
        cls.students.push({
          RegNo: s.RegNo,
          StudentName: s.StudentName,
          year: s.Year,
          section: s.Section,
          status: 'Present',
          reason: ''
        });
      }
    }
  });

  return Object.values(classes);
}

/**
 * Calculate attendance percentage for a class
 */
function getAttendancePercentage(presentCount, totalStudents) {
  if (totalStudents === 0) return 0;
  return ((presentCount / totalStudents) * 100).toFixed(2);
}

/**
 * Get attendance status class for styling
 */
function getAttendanceClass(percentage) {
  if (percentage >= 90) return 'high';
  if (percentage >= 75) return 'medium';
  return 'low';
}

async function approveAllPending() {
  const reqs = window._pendingData || [];
  if (!reqs.length) { toast('No pending requests','war'); return; }
  if (!confirm(`Final approve all ${reqs.length} request(s)? This action cannot be undone.`)) return;
  showG('Processing all approvals…');
  try {
    for (const r of reqs) {
      await api('hod.actOnRequest', { requestId: r.RequestID, action:'Approved', remarks:'Batch approved by HoD' });
    }
    toast(`${reqs.length} request(s) approved!`, 'suc');
    renderPending();
  } catch (e) { toast('Error: ' + e.message, 'err'); }
  finally { hideG(); }
}

async function quickActHoD(reqId, action) {
  showG((action === 'Approved' ? 'Approving' : 'Rejecting') + '…');
  try {
    await api('hod.actOnRequest', { requestId: reqId, action, remarks: action });
    toast(`Request ${action.toLowerCase()}!`, action === 'Approved' ? 'suc' : 'inf');
    renderPending();
  } catch (e) { toast(e.message, 'err'); }
  finally { hideG(); }
}

async function finalActHoD(reqId, action) {
  const remarks = ($('hodRemarks') || {}).value || '';
  closeModal('mReview');
  showG((action === 'Approved' ? 'Finalizing approval' : 'Rejecting') + '…');
  try {
    await api('hod.actOnRequest', { requestId: reqId, action, remarks });
    toast(`Request ${action.toLowerCase()}!`, action === 'Approved' ? 'suc' : 'inf');
    renderPending();
  } catch (e) { toast(e.message, 'err'); }
  finally { hideG(); }
}

async function loadDatewiseAttendance(exportPdf = false) {

  const container = $('absResult');
  container.innerHTML = skeleton(4);

  try {
    // ── FIXED: fetch all students + all absents (not mentor-scoped) ──
    const [requestsRes, studentsRes, absentsRes] = await Promise.all([
      api('hod.getAllRequests', {}),
      api('hod.getStudentReport', {}),        // all students from STUDENT_MASTER
      api('chair.getAllAbsents')              // all absent entries, not filtered by mentorId
    ]);

    const allReqs      = requestsRes.data || [];
    const allStudents  = studentsRes.data  || [];
    const allAbsents   = absentsRes.data   || [];

    const data = calculateDatewiseAttendance(
      absDate,

      allReqs,

      absYear,

    const totalPresent  = data.reduce((s,i) => s + (i.presentCount  || 0), 0);
    const totalOD       = data.reduce((s,i) => s + (i.odCount       || 0), 0);
    const totalLeave    = data.reduce((s,i) => s + (i.leaveCount    || 0), 0);
    const presentPct    = getAttendancePercentage(totalPresent, totalStudents);
    const absentPct     = getAttendancePercentage(totalAbsent,  totalStudents);

      date: absDate, year: absYear, section: absSec,

                if (!students.length) {
                  return `<tr><td colspan="6"><div class="empty-state"><p>No student data</p></div></td></tr>`;
                }
                return students.map((s, idx) => {
                  const badge = s.status === 'Present'

                    : s.status === 'OD'
                      ? `<span class="badge badge-leave">OD</span>`

                  </tr>`;
                }).join('');
              })()}
            </tbody>
          </table>
        </div>
      </div>`;

  } catch (e) {
    container.innerHTML = errBlock(e.message);
  }
}

function getDateDaysAgo(days) {
  const date = new Date();
  date.setDate(date.getDate() - days);
  return date.toISOString().split('T')[0];
}

async function loadAttendanceTrends() {
  const fromDate = $('trendFrom').value;
  const toDate   = $('trendTo').value;
  const year     = $('trendYear').value;
  const section  = $('trendSec').value;

  if (!fromDate || !toDate) { toast('Please select both dates','war'); return; }

  const container = $('trendsResult');
  container.innerHTML = skeleton(4);

  try {
    // ── FIXED: same student/absent fetch as loadDatewiseAttendance ──
    const [requestsRes, studentsRes, absentsRes] = await Promise.all([
      api('hod.getAllRequests', {}),
      api('hod.getStudentReport', {}),
      api('chair.getAllAbsents')
    ]);

    const allReqs     = requestsRes.data || [];
    const allStudents = studentsRes.data  || [];
    const allAbsents  = absentsRes.data   || [];

    const dates    = getDatesInRange(fromDate, toDate);
    const trendData = dates.map(dateStr => {
      const data = calculateDatewiseAttendance(
        dateStr, allStudents, allReqs, allAbsents, year, section
      );
      const totalStudents = data.reduce((s,i) => s + i.totalStudents, 0);
      const totalPresent  = data.reduce((s,i) => s + i.presentCount,  0);
      return {
        date:        dateStr,
        displayDate: new Date(dateStr).toLocaleDateString('en-IN',{ day:'2-digit', month:'short' }),
        percentage:  getAttendancePercentage(totalPresent, totalStudents),
        present:     totalPresent,
        total:       totalStudents
      };
    });

    const avgAttendance = (trendData.reduce((s,d) => s + parseFloat(d.percentage), 0) / trendData.length).toFixed(2);
    const maxAttendance = Math.max(...trendData.map(d => parseFloat(d.percentage))).toFixed(2);
    const minAttendance = Math.min(...trendData.map(d => parseFloat(d.percentage))).toFixed(2);

    container.innerHTML = `
      <div class="report-grid">
        <div class="report-card green"><div class="report-label">Average Attendance</div><div class="report-value">${avgAttendance}%</div></div>
        <div class="report-card green"><div class="report-label">Highest Day</div><div class="report-value">${maxAttendance}%</div></div>
        <div class="report-card orange"><div class="report-label">Lowest Day</div><div class="report-value">${minAttendance}%</div></div>
        <div class="report-card"><div class="report-label">Days Analyzed</div><div class="report-value">${trendData.length}</div></div>
      </div>
      <div class="card mt-14">
        <div class="card-head"><div class="card-title"><i class="fas fa-chart-line"></i> Attendance Trend Chart</div></div>
        <div class="card-body"><div class="chart-wrap-tall"><canvas id="trendChart"></canvas></div></div>
      </div>
      <div class="card mt-14">
        <div class="card-head"><div class="card-title"><i class="fas fa-table"></i> Daily Breakdown</div></div>
        <div class="tbl-wrap">
          <table class="tbl compact-tbl">
            <thead><tr><th>Date</th><th>Total Students</th><th>Present</th><th>Attendance %</th><th>Status</th></tr></thead>
            <tbody>
              ${[...trendData].reverse().map(d => {
                const pct = parseFloat(d.percentage);
                const pctClass = getAttendanceClass(pct);
                return `<tr>
                  <td class="fw6">${d.displayDate}</td>
                  <td>${d.total}</td>
                  <td class="text-suc">${d.present}</td>
                  <td><div class="attendance-bar">
                    <div class="attendance-bar-fill ${pctClass}" style="width:${pct}%;font-size:10px">${d.percentage}%</div>
                  </div></td>
                  <td><span class="badge ${pct>=90?'badge-approved':pct>=75?'badge-leave':'badge-rejected'}">
                    ${pct>=90?'Excellent':pct>=75?'Good':'Needs Attention'}
                  </span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>`;

    charts.trendChart = new Chart($('trendChart'), {
      type: 'line',
      data: {
        labels: trendData.map(d => d.displayDate),
        datasets: [{
          label: 'Attendance %',
          data: trendData.map(d => parseFloat(d.percentage)),
          borderColor: 'rgba(5,150,105,.8)',
          backgroundColor: 'rgba(5,150,105,.1)',
          tension: 0.4, fill: true, pointRadius: 5, borderWidth: 3
        }]
      },
      options: {
        ...chartDefaultOpts(),
        scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } }
      }
    });

  } catch (e) { container.innerHTML = errBlock(e.message); }
}

function getDatesInRange(startDate, endDate) {
  const dates = [];
  const start = new Date(startDate);
  const end = new Date(endDate);
  
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    dates.push(new Date(d).toISOString().split('T')[0]);
  }
  
  return dates;
}

/* ══════════════════════════════════════════════════════════════
   PDF INFRASTRUCTURE — BLACK & WHITE ACADEMIC STYLE
   All colours: pure greyscale only.
══════════════════════════════════════════════════════════════ */

const BW = {
  BLACK:  [0,   0,   0  ],
  DARK:   [30,  30,  30 ],
  MED:    [80,  80,  80 ],
  GREY:   [120, 120, 120],
  LGREY:  [200, 200, 200],
  XLGREY: [240, 240, 240],
  WHITE:  [255, 255, 255]
};

/**
 * Academic header block.
 * Returns Y coordinate after the header block.
 */
function bwHeader(doc, title, subtitle, meta) {
  const pw = doc.internal.pageSize.getWidth();

  doc.setDrawColor(...BW.BLACK); doc.setLineWidth(0.8);
  doc.line(10, 10, pw - 10, 10);

  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(...BW.BLACK);
  doc.text('VELAMMAL COLLEGE OF ENGINEERING AND TECHNOLOGY', pw/2, 17, { align:'center' });

  doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(...BW.MED);
  doc.text('(An Autonomous Institution, Affiliated to Anna University, Chennai)', pw/2, 22.5, { align:'center' });

  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...BW.BLACK);
  doc.text('DEPARTMENT OF INFORMATION TECHNOLOGY', pw/2, 28.5, { align:'center' });

  doc.setDrawColor(...BW.BLACK); doc.setLineWidth(0.5);
  doc.line(10, 31, pw-10, 31);

  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...BW.BLACK);
  doc.text(title.toUpperCase(), pw/2, 37.5, { align:'center' });

  let nextY = 41;
  if (subtitle) {
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...BW.MED);
    doc.text(subtitle, pw/2, 43, { align:'center' });
    nextY = 46;
  }

  doc.setLineWidth(0.8); doc.setDrawColor(...BW.BLACK);
  doc.line(10, nextY, pw-10, nextY);

  if (meta) {
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...BW.MED);
    if (meta.left)  doc.text(meta.left,  14,      nextY + 4);
    if (meta.right) doc.text(meta.right, pw - 14, nextY + 4, { align:'right' });
    return nextY + 9;
  }
  return nextY + 4;
}

/** Footer on every page. */
function bwFooter(doc) {
  const pw = doc.internal.pageSize.getWidth();
  const ph = doc.internal.pageSize.getHeight();
  const n  = doc.internal.getNumberOfPages();
  for (let i = 1; i <= n; i++) {
    doc.setPage(i);
    doc.setDrawColor(...BW.LGREY); doc.setLineWidth(0.3);
    doc.line(10, ph-9, pw-10, ph-9);
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...BW.GREY);
    doc.text(`Page ${i} of ${n}`,                                              pw/2,    ph-5, { align:'center' });
    doc.text('VCET-IT Leave Management System — Confidential',                 14,      ph-5);
    doc.text(`Generated by: ${user.name} (HoD)  |  ${todayIN()}`,             pw - 14, ph-5, { align:'right' });
  }
}

/** Standard B&W autoTable preset. */
function bwTableStyle(headShade = 50) {
  return {
    styles: {
      font: 'helvetica', fontSize: 7.5,
      cellPadding: { top:2.5, right:3, bottom:2.5, left:3 },
      textColor: BW.DARK, lineColor: BW.LGREY, lineWidth: 0.2
    },
    headStyles: {
      fillColor: [headShade, headShade, headShade],
      textColor: BW.WHITE, fontStyle:'bold', fontSize:8, halign:'center'
    },
    alternateRowStyles: { fillColor: BW.XLGREY },
    bodyStyles:   { halign:'center' },
    tableLineColor: BW.BLACK, tableLineWidth: 0.3
  };
}

/** Horizontal KPI summary box. Returns Y after the box. */
function bwSummaryBox(doc, pairs, startY, label) {
  const pw    = doc.internal.pageSize.getWidth();
  if (label) {
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...BW.BLACK);
    doc.text(label, 14, startY);
    startY += 4;
  }
  const boxW  = pw - 28;
  const cellW = Math.floor(boxW / pairs.length);
  const boxH  = 14;
  doc.setDrawColor(...BW.BLACK); doc.setLineWidth(0.3);
  doc.rect(14, startY, boxW, boxH);
  pairs.forEach((pair, idx) => {
    const x  = 14 + idx * cellW;
    if (idx > 0) { doc.setDrawColor(...BW.LGREY); doc.setLineWidth(0.2); doc.line(x, startY, x, startY+boxH); }
    const cx = x + cellW / 2;
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); doc.setTextColor(...BW.GREY);
    doc.text(pair[0].toUpperCase(), cx, startY + 4.5, { align:'center' });
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...BW.BLACK);
    doc.text(String(pair[1]), cx, startY + 11, { align:'center' });
  });
  return startY + boxH + 5;
}

/* ══════════════════════════════════════════
   PDF EXPORT - ATTENDANCE REPORT
══════════════════════════════════════════ */
function exportAttendancePDF() {
  const { date: dateStr, year, section, data,
          totalStudents, totalPresent, totalAbsent, totalOD, totalLeave } = absReportCache;

  if (!dateStr || !data || !data.length) {
    toast('No report data. Please generate the report first.', 'war');
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');
  const pw  = doc.internal.pageSize.getWidth();

  const formattedDate = fmtDateHuman(dateStr);
  const filterNote    = [year ? `Year: ${year}` : '', section ? `Section: ${section}` : '']
                          .filter(Boolean).join(' | ') || 'All Classes';

  let y = bwHeader(doc,
    'Date-wise Class Attendance Report',
    `Date: ${formattedDate}   |   Filter: ${filterNote}`,
    {
      left:  `Academic Year: ${new Date().getFullYear()}-${new Date().getFullYear()+1}`,
      right: `Report Date: ${todayIN()}`
    }
  );

  const presentPct = getAttendancePercentage(totalPresent, totalStudents);
  const absentPct  = getAttendancePercentage(totalAbsent, totalStudents);

  y = bwSummaryBox(doc, [
    ['Total Students', totalStudents],
    ['Present',        totalPresent],
    ['On Duty (OD)',   totalOD],
    ['On Leave',       totalLeave],
    ['Absent',         totalAbsent],
    ['Present %',      `${presentPct}%`],
    ['Absent %',       `${absentPct}%`]
  ], y, 'I.  ATTENDANCE SUMMARY');

  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...BW.BLACK);
  doc.text('II.  CLASS-WISE BREAKDOWN', 14, y); y += 4;

  doc.autoTable({
    startY: y,
    head: [['Year','Section','Total','Present','OD','Leave','Absent','Present %','Absent %']],
    body: data.map(item => {
      const pPct = getAttendancePercentage(item.presentCount, item.totalStudents);
      const aPct = getAttendancePercentage(item.absentCount, item.totalStudents);
      return [
        `${item.year} Year`, `Sec ${item.section}`,
        item.totalStudents, item.presentCount, item.odCount||0, item.leaveCount||0,
        item.absentCount, `${pPct}%`, `${aPct}%`
      ];
    }),
    ...bwTableStyle(40),
    columnStyles: { 0:{ halign:'left' }, 1:{ halign:'center' } },
    margin: { left:14, right:14 }
  });

  y = doc.lastAutoTable.finalY + 7;

  // FIND AND REPLACE this block (starts after "let students = []")

  let students = [];
  data.forEach(item => { if (item.students) students = students.concat(item.students); });

  // ── UPDATED: Only Absent and Leave students (exclude Present & OD) ──
  const nonPresentStudents = students.filter(s => s.status === 'Absent' || s.status === 'Leave');

  if (nonPresentStudents.length > 0) {
    if (y > 230) { doc.addPage(); y = 15; }
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...BW.BLACK);
    doc.text('III.  ABSENT & LEAVE STUDENTS', 14, y); y += 4;

    doc.autoTable({
      startY: y,
      head: [['S.No','Reg. No','Student Name','Year','Section','Status','Reason / Remarks']],
      body: nonPresentStudents.map((s, idx) => [
        idx+1, s.RegNo, s.StudentName, s.year, s.section, s.status, s.reason||'—'
      ]),
      ...bwTableStyle(40),
      columnStyles: {
        0:{ cellWidth:10, halign:'center' },
        2:{ halign:'left', cellWidth:45 },
        6:{ halign:'left' }
      },
      margin: { left:14, right:14 }
    });
    y = doc.lastAutoTable.finalY + 7;
  }

  const ph   = doc.internal.pageSize.getHeight();
  const sigY = Math.min(y + 10, ph - 30);
  doc.setDrawColor(...BW.LGREY); doc.setLineWidth(0.2);
  doc.line(14,     sigY, 70,      sigY);
  doc.line(pw-70,  sigY, pw - 14, sigY);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...BW.MED);
  doc.text('Class In-charge / Mentor',  14,      sigY + 4);
  doc.text('Head of Department',        pw - 14, sigY + 4, { align:'right' });

  bwFooter(doc);
  doc.save(`VCET_Attendance_${dateStr}.pdf`);
  toast('Academic attendance report generated!', 'suc');
}

/* ══════════════════════════════════════════
   PDF 2 — COMPREHENSIVE ACADEMIC REPORT
   consolidated / yearwise / daterange / monthwise / sectionwise
══════════════════════════════════════════ */
function generateComprehensiveAcademicPDF(data, reportType, extraMeta) {
  if (!data || !data.length) { toast('No data to export','war'); return; }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('l', 'mm', 'a4');
  const pw  = doc.internal.pageSize.getWidth();

  const labels = {
    consolidated: 'Consolidated Department Report',
    yearwise:     'Year-wise Analysis Report',
    studentwise:  'Student-wise Summary Report',
    daterange:    'Date Range Analysis Report',
    monthwise:    'Monthly Analytics Report',
    sectionwise:  'Section-wise Analysis Report'
  };

  const parts = [];
  if (extraMeta && extraMeta.fromDate) parts.push(`From: ${fmtDatePDF(extraMeta.fromDate)}`);
  if (extraMeta && extraMeta.toDate)   parts.push(`To:   ${fmtDatePDF(extraMeta.toDate)}`);
  if (extraMeta && extraMeta.year)     parts.push(`Year: ${extraMeta.year}`);
  if (extraMeta && extraMeta.section)  parts.push(`Section: ${extraMeta.section}`);
  if (extraMeta && extraMeta.status)   parts.push(`Status: ${extraMeta.status}`);
  const subtitle = parts.length ? parts.join('   |   ') : null;

  let y = bwHeader(doc,
    'Leave & OD Sanction — ' + (labels[reportType] || 'Comprehensive Report'),
    subtitle,
    {
      left:  `Academic Year: ${new Date().getFullYear()}-${new Date().getFullYear()+1}`,
      right: `Generated: ${todayIN()}`
    }
  );

  const approved  = data.filter(r => r.FinalStatus === 'Approved');
  const rejected  = data.filter(r => r.FinalStatus === 'Rejected');
  const pending   = data.filter(r => ['Pending','Forwarded','HoD Review'].includes(r.FinalStatus));
  const totalDays = approved.reduce((s,r) => s + (+r.TotalDays||0), 0);
  const leave     = data.filter(r => r.LeaveType === 'Leave');
  const od        = data.filter(r => r.LeaveType === 'OD');
  const medical   = data.filter(r => r.LeaveType === 'Medical');
  const emergency = data.filter(r => r.LeaveType === 'Emergency');
  const safeDiv   = (n,d) => d > 0 ? ((n/d)*100).toFixed(1)+'%' : '0.0%';
  const appPct    = safeDiv(approved.length, data.length);

  y = bwSummaryBox(doc, [
    ['Total Requests', data.length],
    ['Approved',       approved.length],
    ['Rejected',       rejected.length],
    ['Pending',        pending.length],
    ['Approval Rate',  appPct],
    ['Approved Days',  totalDays]
  ], y, 'I.  SUMMARY STATISTICS');

  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...BW.BLACK);
  doc.text('II.  LEAVE TYPE BREAKDOWN', 14, y); y += 4;

  doc.autoTable({
    startY: y,
    head: [['Leave Type','Total Count','Percentage','Approved','Rejected','Pending']],
    body: [
      ['Leave',     leave.length,     safeDiv(leave.length,data.length),     leave.filter(r=>r.FinalStatus==='Approved').length,     leave.filter(r=>r.FinalStatus==='Rejected').length,     leave.filter(r=>['Pending','Forwarded','HoD Review'].includes(r.FinalStatus)).length],
      ['OD',        od.length,        safeDiv(od.length,data.length),        od.filter(r=>r.FinalStatus==='Approved').length,        od.filter(r=>r.FinalStatus==='Rejected').length,        od.filter(r=>['Pending','Forwarded','HoD Review'].includes(r.FinalStatus)).length],
      ['Medical',   medical.length,   safeDiv(medical.length,data.length),   medical.filter(r=>r.FinalStatus==='Approved').length,   medical.filter(r=>r.FinalStatus==='Rejected').length,   medical.filter(r=>['Pending','Forwarded','HoD Review'].includes(r.FinalStatus)).length],
      ['Emergency', emergency.length, safeDiv(emergency.length,data.length), emergency.filter(r=>r.FinalStatus==='Approved').length, emergency.filter(r=>r.FinalStatus==='Rejected').length, emergency.filter(r=>['Pending','Forwarded','HoD Review'].includes(r.FinalStatus)).length]
    ],
    ...bwTableStyle(40),
    columnStyles: { 0:{ halign:'left' } },
    margin: { left:14, right:14 }
  });

  y = doc.lastAutoTable.finalY + 7;

  if (y > 155) { doc.addPage(); y = 15; }
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...BW.BLACK);
  doc.text('III.  YEAR-WISE ANALYSIS', 14, y); y += 4;

  doc.autoTable({
    startY: y,
    head: [['Year','Total','Leave','OD','Medical','Emergency','Approved','Rejected','Pending','Approval %']],
    body: ['I','II','III','IV'].map(yr => {
      const yd = data.filter(r => r.Year === yr);
      const a  = yd.filter(r=>r.FinalStatus==='Approved').length;
      const rj = yd.filter(r=>r.FinalStatus==='Rejected').length;
      const p  = yd.filter(r=>['Pending','Forwarded','HoD Review'].includes(r.FinalStatus)).length;
      return [
        `${yr} Year`, yd.length,
        yd.filter(r=>r.LeaveType==='Leave').length,
        yd.filter(r=>r.LeaveType==='OD').length,
        yd.filter(r=>r.LeaveType==='Medical').length,
        yd.filter(r=>r.LeaveType==='Emergency').length,
        a, rj, p, safeDiv(a, yd.length)
      ];
    }),
    ...bwTableStyle(40),
    columnStyles: { 0:{ halign:'left' } },
    margin: { left:14, right:14 }
  });

  y = doc.lastAutoTable.finalY + 7;

  if (y > 150) { doc.addPage(); y = 15; }
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...BW.BLACK);
  doc.text(`IV.  DETAILED REQUEST REGISTER  (Total: ${data.length} records)`, 14, y); y += 4;

  doc.autoTable({
    startY: y,
    head: [['S.No','Req. ID','Reg. No','Student Name','Yr/Sec','Type','Days','From','To','Mentor','Chair','HoD','Status']],
    body: data.map((r, idx) => [
      idx+1,
      r.RequestID,
      r.RegNo,
      r.StudentName,
      `${r.Year||'?'}-${r.Section||'?'}`,
      r.LeaveType,
      r.TotalDays,
      fmtDatePDF(r.FromDate),
      fmtDatePDF(r.ToDate),
      r.MentorStatus,
      r.ChairpersonStatus,
      r.HoDStatus||'—',
      r.FinalStatus
    ]),
    ...bwTableStyle(30),
    columnStyles: {
      0:{ cellWidth:9,  halign:'center' },
      3:{ cellWidth:35, halign:'left'   },
      6:{ cellWidth:10 }
    },
    margin: { left:14, right:14 }
  });

  const ph   = doc.internal.pageSize.getHeight();
  const fy   = doc.lastAutoTable.finalY + 12;
  const sigY = fy < ph - 30 ? fy : ph - 25;
  doc.setDrawColor(...BW.LGREY); doc.setLineWidth(0.2);
  doc.line(14,      sigY, 65,      sigY);
  doc.line(pw - 65, sigY, pw - 14, sigY);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...BW.MED);
  doc.text('Prepared by',        14,      sigY + 4);
  doc.text('Head of Department', pw - 14, sigY + 4, { align:'right' });

  bwFooter(doc);
  doc.save(`VCET_${reportType}_Report_${dateStr()}.pdf`);
  toast('Academic report generated!', 'suc');

  function dateStr() { return new Date().toISOString().slice(0,10); }
}

/* ══════════════════════════════════════════
   PDF 4 — MAIN REPORT GENERATOR (modal trigger)
══════════════════════════════════════════ */
async function generateHoDReport() {
  closeModal('mReport');
  showG('Generating academic report…');
  try {
    const type      = $('rType').value;
    const statusFil = $('rStatus').value;
    let payload     = {};
    let extraMeta   = {};

    if (type === 'attendance') {
      const dateVal = $('rAttendanceDate').value;
      if (!dateVal) { toast('Please select a date.','war'); hideG(); return; }
      absReportCache.date = dateVal;
      await loadDatewiseAttendance(true);
      return;
    }

    if (type === 'daterange') {
      const fromVal = $('rFrom').value;
      const toVal   = $('rTo').value;
      if (!fromVal || !toVal) { toast('Please select both From and To dates.','war'); hideG(); return; }
      payload.fromDate   = fromVal; payload.toDate     = toVal;
      extraMeta.fromDate = fromVal; extraMeta.toDate   = toVal;

    } else if (type === 'studentwise') {
      payload.search = $('rStudent').value;

    } else if (type === 'yearwise' || type === 'sectionwise') {
      payload.year    = $('rYear').value;
      payload.section = $('rSection').value;
      if (payload.year)    extraMeta.year    = payload.year;
      if (payload.section) extraMeta.section = payload.section;

    } else if (type === 'monthwise') {
      const m = $('rMonth').value;
      if (!m) { toast('Please select a month.','war'); hideG(); return; }
      const [my, mm]   = m.split('-');
      const lastDay    = new Date(+my, +mm, 0).getDate();
      payload.fromDate = `${m}-01`;
      payload.toDate   = `${m}-${String(lastDay).padStart(2,'0')}`;
      extraMeta.fromDate = payload.fromDate;
      extraMeta.toDate   = payload.toDate;
    }

    if (statusFil) extraMeta.status = statusFil;

    const res = await api('hod.getAllRequests', payload);
    let data  = res.data || [];

    if (payload.fromDate && payload.toDate) {
      const from = new Date(payload.fromDate + 'T00:00:00');
      const to   = new Date(payload.toDate   + 'T23:59:59');
      data = data.filter(r => {
        const dt = parseLocalDate(r.FromDate);
        return dt && dt >= from && dt <= to;
      });
    }

    if (payload.year)    data = data.filter(r => r.Year    === payload.year);
    if (payload.section) data = data.filter(r => r.Section === payload.section);
    if (statusFil) data = data.filter(r => r.FinalStatus === statusFil);

    if (!data.length) { toast('No records match the selected filters.','war'); return; }
    generateComprehensiveAcademicPDF(data, type, extraMeta);

  } catch (e) { toast('Error: ' + e.message, 'err'); }
  finally { hideG(); }
}
